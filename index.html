<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Absensi Lokasi</title>
  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#007bff">
</head>
<body>
  <h1>Absensi Mahasiswa</h1>
  <form id="absenForm">
    <input type="text" id="nama" placeholder="Nama" required><br>
    <input type="text" id="nim" placeholder="NIM" required><br>
    <input type="text" id="kelas" placeholder="Kelas" required><br>
    <button type="submit">Absen Sekarang</button>
  </form>

  <div id="status"></div>

  <h2>Riwayat Absensi</h2>
  <ul id="riwayatAbsensi"></ul>

  <script src="script.js"></script>
</body>
</html>
